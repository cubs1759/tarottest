<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神祕學占卜：高自訂互動塔羅</title>
    <style>
        :root {
            --bg-color: #0a0c10;
            --card-back: radial-gradient(circle at center, #1f1138 0%, #080312 100%);
            --card-front: #fdfbf7;
            --gold: #dfb76c;
            --gold-glow: rgba(223, 183, 108, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        /* 初始設定面板 */
        .setup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 12, 16, 0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .setup-box {
            background: #111;
            border: 2px solid var(--gold);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--gold-glow);
            text-align: center;
            max-width: 400px;
            width: 80%;
        }
        .setup-box h2 { margin-top: 0; color: var(--gold); }
        .setup-item {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }
        .setup-item input[type="number"] {
            width: 60px; padding: 5px; font-size: 1rem; text-align: center;
            background: #222; color: var(--gold); border: 1px solid var(--gold); border-radius: 5px;
        }
        .setup-item input[type="checkbox"] {
            width: 20px; height: 20px; accent-color: var(--gold);
        }

        .header {
            text-align: center;
            z-index: 200;
            padding: 15px 0 5px 0;
            width: 100%;
            background: linear-gradient(to bottom, var(--bg-color) 80%, transparent);
        }

        h1 {
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold-glow);
            margin: 0 0 5px 0;
            font-size: 1.6rem;
        }

        .status-msg {
            font-size: 1rem;
            color: #ddd;
            height: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .progress-container {
            width: 250px; height: 6px; background: #222; border-radius: 3px;
            margin: 5px auto; overflow: hidden; border: 1px solid #444; display: none;
        }
        .progress-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #b8860b, var(--gold));
            box-shadow: 0 0 8px var(--gold); transition: width 0.1s ease;
        }

        .table-area {
            position: relative; width: 100%; flex-grow: 1;
            perspective: 1400px; touch-action: none;
        }

        .card {
            width: 55px; height: 95px;
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            transform-style: preserve-3d;
            transition: transform 0.6s ease, left 0.6s ease, top 0.6s ease, opacity 0.4s;
            cursor: pointer; border-radius: 5px;
        }

        .card.fast-move {
            transition: transform 0.1s ease, left 0.1s ease, top 0.1s ease !important;
        }

        .card.hoverable:hover {
            transform: translate(-50%, -50%) rotate(var(--angle, 0deg)) translateY(-35px) scale(1.05) !important;
            z-index: 1000 !important;
        }

        /* 標記牌疊選擇時的 hover 效果 */
        .card.pile-hoverable:hover {
            filter: brightness(1.3);
            box-shadow: 0 0 10px var(--gold);
        }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 5px;
            border: 1px solid var(--gold); box-sizing: border-box;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6);
        }

        .card-back {
            background: var(--card-back); display: flex; align-items: center; justify-content: center;
        }
        .card-back::after { content: "✦"; color: var(--gold); font-size: 1.2rem; opacity: 0.6; }

        .card-front {
            background: var(--card-front); color: #111;
            transform: rotateY(180deg); padding: 4px; text-align: center;
            display: flex; align-items: center; justify-content: center;
        }

        .card.flipped {
            transform: translate(-50%, -50%) rotate(0deg) scale(2.2) translateY(-10px) !important;
            z-index: 999 !important;
        }
        .card.reversed .card-front-content { transform: rotate(180deg); }

        .card-front h3 { margin: 0; font-size: 0.6rem; color: #1a0933; word-break: break-all; }
        .card-front .suit-icon { font-size: 1.1rem; margin-bottom: 4px; }

        /* 結果顯示 */
        .result-overlay {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(8, 4, 18, 0.98); border-top: 2px solid var(--gold);
            padding: 20px; box-sizing: border-box; text-align: center;
            transform: translateY(100%); transition: transform 0.5s ease-in-out;
            z-index: 1000; max-height: 50vh; overflow-y: auto;
        }
        .result-overlay.show { transform: translateY(0); }
        .result-text { font-size: 1.1rem; margin-bottom: 15px; text-align: left; max-width: 600px; margin: 0 auto 15px auto; line-height: 1.5; }
        .result-item { border-bottom: 1px dashed #444; padding: 10px 0; }
